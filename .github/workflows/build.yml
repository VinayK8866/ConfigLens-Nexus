name: Eclipse Plugin CI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Set up JDK
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build and Package
      if: success()
      run: |
        mvn clean verify -Pjgit-ts -DskipTests=true
        
        # Define destination
        DEST="com.configlens.updatesite/target/repository"
        
        # Inject premium landing page assets (including hidden files like .nojekyll)
        cp -rv com.configlens.updatesite/web/. "$DEST/"
        
        echo "Deployment directory prepared: $DEST"
        ls -la "$DEST"

    - name: Deploy to GitHub Pages
      if: success() && github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./com.configlens.updatesite/target/repository
        force_orphan: true
        user_name: 'github-actions[bot]'
        user_email: 'github-actions[bot]@users.noreply.github.com'
